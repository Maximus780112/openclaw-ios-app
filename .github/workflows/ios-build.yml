name: Apple Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build OpenClawControl
        run: |
          xcodebuild \
            -project apps/ios/OpenClawControl/OpenClawControl.xcodeproj \
            -scheme OpenClawControl \
            -destination 'platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
